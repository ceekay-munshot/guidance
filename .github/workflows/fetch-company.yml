# Munshot — fetch-company (Steps 6–10)
# ---------------------------------------------------------------------------
# Runs the full pipeline for ONE company. Triggered two ways:
#   • the Worker's /api/analyze does a workflow_dispatch with { company, slug }  (Step 10, live)
#   • the owner runs it by hand: Actions → "fetch-company" → Run workflow
# Chain: fetch (6) → extract B+C (7) → web risks+thesis (8a) → verify (8b)
#        → model E/F/G (9a) → key_takeaways + end-to-end validation (9b).
# When `slug` is set, results are published to Cloudflare KV (status:<slug> / report:<slug>)
# so the Worker can serve them; the artifact (pipeline/out/**) is uploaded either way.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SCREENER_EMAIL, SCREENER_PASSWORD, FIRECRAWL_API_KEY, SCRAPEDO_API_KEY  (Step 6)
#   OPENAI_API_KEY                                                    (Steps 7, 8)
#   CF_ACCOUNT_ID, CF_KV_NAMESPACE_ID, CF_API_TOKEN                   (Step 10 — KV writes)
# Optional repo secret (a stronger, INDEPENDENT cross-provider verification):
#   ANTHROPIC_API_KEY  — when set, Step 8b's audit runs on a different model family
# Optional repo variables (Settings → Variables → Actions):
#   OPENAI_MODEL  — overrides the extraction/research model (pipeline/lib/openai.mjs)
#   VERIFY_MODEL  — overrides the verification model (defaults to a different model)
# ---------------------------------------------------------------------------

name: fetch-company

on:
  workflow_dispatch:
    inputs:
      company:
        description: "Company name or ticker"
        required: true
        default: "Navin Fluorine"
        type: string
      slug:
        description: "KV slug (set by the Worker; leave blank for a manual run — no KV writes)"
        required: false
        default: ""
        type: string
      ticker:
        description: "Ticker (set by the Worker; used to resolve on Screener more reliably)"
        required: false
        default: ""
        type: string
      run_extract:
        description: "Run the LLM extractor (Step 7) after fetch"
        required: false
        default: true
        type: boolean
      run_research:
        description: "Run web risks + thesis (Step 8a) after extract"
        required: false
        default: true
        type: boolean
      run_verify:
        description: "Run the second-model verification pass (Step 8b)"
        required: false
        default: true
        type: boolean
      run_model:
        description: "Run the financial model E/F/G (Step 9a)"
        required: false
        default: true
        type: boolean
      run_finalize:
        description: "Run key_takeaways + end-to-end validation (Step 9b)"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

# Collapse duplicate runs for the same company (e.g. two users clicking Analyze in the KV
# read-then-write race window) into one — the newest supersedes an in-progress duplicate, so we
# never burn two full pipelines on the same slug. Keyed by slug (live) or company (manual runs).
concurrency:
  group: fetch-company-${{ inputs.slug || inputs.company }}
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Job-level env so every step (incl. each stage's best-effort progress ping and fetch-company's
    # own transcript ping) can write status:<slug> to KV. SLUG is blank for manual runs → all KV
    # writes no-op. Secrets in env are masked, never logged.
    env:
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      SLUG: ${{ inputs.slug }}
      # Resolve on Screener by ticker when the Worker supplied one (more reliable), else the name.
      COMPANY: ${{ inputs.company }}
      RESOLVE_QUERY: ${{ inputs.ticker != '' && inputs.ticker || inputs.company }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Offline unit tests (pure JS, no deps, no network, no LLM). Fail fast if any of
      # prompt-building / assembly / source-tagging / falsifier + verifier / Worker logic regress.
      - name: Test pipeline + worker (offline)
        run: |
          node pipeline/test/extract.test.mjs
          node pipeline/test/research.test.mjs
          node pipeline/test/model.test.mjs
          node worker/test/worker.test.mjs
          node worker/test/analyze.test.mjs
          node worker/test/export.test.mjs

      # No-save install (deps are NOT committed — see pipeline/BUNDLE.md).
      - name: Install deps (no-save) + Chromium
        run: |
          npm install --no-save playwright pdfjs-dist cheerio
          npx playwright install --with-deps chromium

      - name: Fetch company
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SCRAPEDO_API_KEY: ${{ secrets.SCRAPEDO_API_KEY }}
        # Untrusted input passed via env, never interpolated into the shell. The `progress` write is
        # best-effort (no-op without SLUG/creds); fetch-company itself pings "transcript" mid-run.
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" resolve
          node pipeline/fetch-company.mjs "$RESOLVE_QUERY"

      # Step 7: extract report Sections B + C into pipeline/out/<slug>/report.json.
      # Gated on run_extract. Secrets stay in env (never echoed); the script never logs the key.
      - name: Extract concall (LLM, Step 7)
        if: ${{ inputs.run_extract }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" extract
          node pipeline/extract-concall.mjs "$COMPANY"

      # Step 8a: web-grounded C.6 risks + Section D thesis / anti-thesis. Uses OpenAI web_search
      # (Firecrawl search as fallback). Augments the same report.json.
      - name: Research risks + thesis (Step 8a)
        if: ${{ inputs.run_research }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" research
          node pipeline/research-concall.mjs "$COMPANY"

      # Step 8b: second-model verification of Step 7's transcript claims. Writes verification.json
      # and prunes clear hallucinations from report.json. ANTHROPIC_API_KEY (optional) makes it a
      # true cross-provider check; otherwise it uses a different OpenAI model.
      - name: Verify extraction (Step 8b)
        if: ${{ inputs.run_verify }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERIFY_MODEL: ${{ vars.VERIFY_MODEL }}
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" verify
          node pipeline/verify-extract.mjs "$COMPANY"

      # Step 9a: financial model — Sections E (rows + assumptions), F (valuation), G (next steps).
      # The LLM supplies assumption levers + prose; the script computes every number deterministically.
      - name: Model E / F / G (Step 9a)
        if: ${{ inputs.run_model }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" model
          node pipeline/model-report.mjs "$COMPANY"

      # Step 9b: key_takeaways synthesis across B–G, then END-TO-END schema validation.
      # This emits the first COMPLETE report.json and fails the job if it doesn't validate.
      - name: Finalize + validate (Step 9b)
        if: ${{ inputs.run_finalize }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          node pipeline/kv-put.mjs progress "$SLUG" finalize
          node pipeline/finalize-report.mjs "$COMPANY"

      # Step 10/11: on success, publish the report to KV, flip status → done, and upsert the library index.
      - name: KV — publish report
        if: ${{ inputs.slug != '' && success() }}
        run: node pipeline/kv-put.mjs report "$SLUG"

      # Step 10/11: on ANY failure above, mark the job errored so the client stops polling and shows why.
      - name: KV — mark error
        if: ${{ inputs.slug != '' && failure() }}
        run: node pipeline/kv-put.mjs error "$SLUG" "Couldn't complete the analysis — the company may not be resolvable on Screener, or a step errored."

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: pipeline/out/**
          if-no-files-found: warn
          retention-days: 14
