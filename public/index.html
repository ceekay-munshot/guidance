<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concall Deep Dive — MGA</title>
  <meta name="description" content="Institutional-grade earnings-call analysis, one company at a time." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: {
        display: ['"Space Grotesk"', 'ui-sans-serif', 'sans-serif'],
        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
      } } },
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root { --bg: #FBFAFF; --ink: #1e293b; }
    body {
      color: var(--ink); background-color: var(--bg);
      background-image:
        radial-gradient(40rem 40rem at 8% -8%, rgba(139,92,246,.16), transparent 60%),
        radial-gradient(38rem 38rem at 105% 4%, rgba(236,72,153,.12), transparent 58%),
        radial-gradient(42rem 42rem at 60% 120%, rgba(59,130,246,.12), transparent 60%);
      background-attachment: fixed; background-repeat: no-repeat;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }
    .font-display { font-family: 'Space Grotesk', ui-sans-serif, sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .brand-gradient { background: linear-gradient(100deg, #6366F1, #A855F7 45%, #EC4899 80%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .brand-bg { background: linear-gradient(100deg, #6366F1, #A855F7 45%, #EC4899 80%); }

    .card { background: #fff; border-radius: 1.5rem; box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 12px 32px -16px rgba(16,24,40,.18); }
    .card-hover { transition: transform .2s ease, box-shadow .2s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 20px 44px -18px rgba(16,24,40,.26); }

    .btn-primary { background: linear-gradient(100deg, #6366F1, #A855F7 45%, #EC4899 80%); color: #fff; border-radius: 9999px; box-shadow: 0 10px 24px -12px rgba(168,85,247,.7); transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; }
    .btn-primary:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 14px 30px -12px rgba(168,85,247,.8); }
    .btn-primary:not(:disabled):active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn .45s ease both; }

    /* Screen router */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Type-ahead */
    .typeahead-item[aria-selected="true"], .typeahead-item:hover { background: #f5f3ff; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 1.25rem; height: 1.25rem; border-radius: 9999px; border: 2px solid rgba(99,102,241,.25); border-top-color: #8b5cf6; animation: spin .7s linear infinite; }

    /* Loading progress */
    .progress-track { height: .55rem; border-radius: 9999px; background: #eef0f6; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 9999px; background: linear-gradient(100deg, #6366F1, #A855F7 45%, #EC4899 80%); transition: width .6s cubic-bezier(.22,.61,.36,1); }
    @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .stage-active .stage-dot { animation: pulseDot 1.1s ease-in-out infinite; }

    /* Institutional report tables (report.js output uses .r-table) */
    .r-table { width: 100%; border-collapse: collapse; min-width: 34rem; }
    .r-table thead th { text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #94a3b8; padding: .5rem .75rem; border-bottom: 1px solid #eef0f6; white-space: nowrap; }
    .r-table tbody td { padding: .6rem .75rem; font-size: .875rem; color: #334155; border-top: 1px solid #f1f5f9; vertical-align: top; }
    .r-table tbody tr:first-child td { border-top: 0; }
    .r-table .num { text-align: right; font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; white-space: nowrap; color: #1e293b; }
    .r-table thead th.num { text-align: right; }

    /* Sticky in-report section nav + scroll-spy */
    .report-nav a { color: #64748b; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .report-nav a:hover { color: #4f46e5; }
    .report-nav a.active { color: #4f46e5; border-bottom-color: #a855f7; }
    [id^="sec-"] { scroll-margin-top: 5.5rem; }

    .skel { background: #eef0f6; border-radius: 9999px; }
    @keyframes shimmer { 0% { opacity: .55; } 50% { opacity: 1; } 100% { opacity: .55; } }
    .skel { animation: shimmer 1.4s ease-in-out infinite; }
  </style>
</head>

<body class="min-h-screen antialiased">
  <!-- Persistent brand bar -->
  <header class="sticky top-0 z-30 backdrop-blur bg-[#FBFAFF]/80 border-b border-slate-100">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <button id="brand-home" type="button" class="flex items-center gap-2.5 group">
        <span class="inline-flex items-center justify-center w-7 h-7 rounded-lg brand-bg text-white shadow-sm">
          <i data-lucide="radar" class="w-4 h-4"></i>
        </span>
        <span class="font-display font-bold tracking-tight text-slate-800 group-hover:opacity-80">Concall Deep Dive</span>
        <span class="text-slate-300">·</span>
        <span class="font-mono text-xs text-slate-400 tracking-tight">MGA</span>
      </button>
      <span class="hidden sm:inline text-xs text-slate-400">Institutional earnings-call analysis</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6">
    <!-- ── SCREEN 1 · LANDING ─────────────────────────────────────────── -->
    <section id="screen-landing" class="screen active"></section>

    <!-- ── SCREEN 2 · LOADING ─────────────────────────────────────────── -->
    <section id="screen-loading" class="screen"></section>

    <!-- ── SCREEN 3 · REPORT ──────────────────────────────────────────── -->
    <section id="screen-report" class="screen"></section>
  </main>

  <footer class="max-w-6xl mx-auto px-6 py-10 text-xs text-slate-400">
    Concall Deep Dive · Munshot for MGA — research observations, <span class="font-medium">not investment advice</span>. Not a SEBI-registered adviser.
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
